spring:
  application:
    name: api-gateway

  config:
    import: "optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

  cloud:
    config:
      uri: ${CONFIG_SERVER_URI:http://localhost:8888}
      username: ${CONFIG_SERVER_USER:configuser}
      password: ${CONFIG_SERVER_PASSWORD:configpass}
      fail-fast: false

    gateway:
      # Integrate with Eureka — resolve lb://service-name URIs
      discovery:
        locator:
          enabled: false        # We define routes explicitly for full control
          lower-case-service-id: true

      # ── Global filters ──────────────────────────────────────
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - ${ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
            allowedHeaders: ["*"]
            allowCredentials: true
            maxAge: 3600

      # ── Route Definitions ───────────────────────────────────
      routes:

        # AUTH SERVICE
        - id: auth-service-public
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@authRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: auth-cb
                fallbackUri: forward:/fallback/auth

        # PRODUCT SERVICE — public read
        - id: product-service-public
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**, /api/v1/search/**
            - Method=GET
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@defaultRateLimiter}"
                key-resolver: "#{@ipKeyResolver}"
            - name: CircuitBreaker
              args:
                name: product-cb
                fallbackUri: forward:/fallback/product
            - name: Retry
              args:
                retries: 3
                statuses: BAD_GATEWAY, SERVICE_UNAVAILABLE
                methods: GET
                backoff:
                  firstBackoff: 100ms
                  maxBackoff: 500ms
                  factor: 2

        # PRODUCT SERVICE — authenticated write (seller/admin)
        - id: product-service-write
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**
            - Method=POST, PUT, PATCH, DELETE
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@defaultRateLimiter}"
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: product-write-cb
                fallbackUri: forward:/fallback/product

        # INVENTORY SERVICE
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/v1/inventory/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@defaultRateLimiter}"
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: inventory-cb
                fallbackUri: forward:/fallback/inventory

        # CART SERVICE
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/api/v1/cart/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@defaultRateLimiter}"
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: cart-cb
                fallbackUri: forward:/fallback/cart

        # ORDER SERVICE
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@defaultRateLimiter}"
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: order-cb
                fallbackUri: forward:/fallback/order

        # SELLER SERVICE
        - id: seller-service
          uri: lb://seller-service
          predicates:
            - Path=/api/v1/sellers/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@defaultRateLimiter}"
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: seller-cb
                fallbackUri: forward:/fallback/seller

        # NOTIFICATION SERVICE (admin/internal only)
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter: "#{@defaultRateLimiter}"
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: notification-cb
                fallbackUri: forward:/fallback/notification

# Eureka client registration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://eurekauser:eurekapass@localhost:8761/eureka}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# JWT config (must match auth-service)
jwt:
  secret: ${JWT_SECRET:MyUltraSecureJwtSecretKeyForDevOnly!ChangeInProd}
  access-token-expiry-ms: 900000
  refresh-token-expiry-ms: 604800000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.smartorder: DEBUG