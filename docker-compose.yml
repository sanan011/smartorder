# ============================================================
# SmartOrder — Full Stack Docker Compose
# Run: docker-compose up -d
# ============================================================

version: '3.9'

# ── Shared network ────────────────────────────────────────
networks:
  smartorder-net:
    driver: bridge

# ── Named volumes ─────────────────────────────────────────
volumes:
  postgres_auth_data:
  postgres_product_data:
  postgres_order_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  mongodb_data:
  elasticsearch_data:
  minio_data:

services:

  # ── PostgreSQL: Auth Service ────────────────────────────
  postgres-auth:
    image: postgres:16-alpine
    container_name: smartorder-postgres-auth
    environment:
      POSTGRES_DB:       smartorder_auth
      POSTGRES_USER:     smartorder
      POSTGRES_PASSWORD: smartorder
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - smartorder-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartorder -d smartorder_auth"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── PostgreSQL: Product Service ─────────────────────────
  postgres-product:
    image: postgres:16-alpine
    container_name: smartorder-postgres-product
    environment:
      POSTGRES_DB:       smartorder_products
      POSTGRES_USER:     smartorder
      POSTGRES_PASSWORD: smartorder
    ports:
      - "5433:5432"
    volumes:
      - postgres_product_data:/var/lib/postgresql/data
    networks:
      - smartorder-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartorder -d smartorder_products"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── PostgreSQL: Order Service ───────────────────────────
  postgres-order:
    image: postgres:16-alpine
    container_name: smartorder-postgres-order
    environment:
      POSTGRES_DB:       smartorder_orders
      POSTGRES_USER:     smartorder
      POSTGRES_PASSWORD: smartorder
    ports:
      - "5434:5432"
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    networks:
      - smartorder-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartorder -d smartorder_orders"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: smartorder-redis
    command: redis-server --requirepass smartorder --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smartorder-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "smartorder", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Zookeeper ───────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: smartorder-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME:   2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - smartorder-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Kafka ───────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: smartorder-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID:                        1
      KAFKA_ZOOKEEPER_CONNECT:                zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:   PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS:             PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME:       PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE:        'true'
      KAFKA_LOG_RETENTION_HOURS:              168
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - smartorder-net
    healthcheck:
      test: ["CMD-SHELL",
             "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout:  10s
      retries:  5

  # ── Kafka UI ────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: smartorder-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME:            smartorder
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - smartorder-net

  # ── MongoDB ─────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: smartorder-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - smartorder-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Elasticsearch ───────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.3
    container_name: smartorder-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=smartorder-cluster
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - smartorder-net
    healthcheck:
      test: ["CMD-SHELL",
             "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 15s
      timeout:  10s
      retries:  5

  # ── MinIO (Object Storage) ──────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: smartorder-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - smartorder-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Zipkin (Distributed Tracing) ────────────────────────
  zipkin:
    image: openzipkin/zipkin:3
    container_name: smartorder-zipkin
    ports:
      - "9411:9411"
    networks:
      - smartorder-net

  # ── Config Server ───────────────────────────────────────
  config-server:
    build:
      context: .
      dockerfile: services/config-server/Dockerfile
    container_name: smartorder-config-server
    ports:
      - "8888:8888"
    environment:
      CONFIG_SERVER_USER:     configuser
      CONFIG_SERVER_PASSWORD: configpass
      CONFIG_ENCRYPT_KEY:     MyStr0ngEncryptKey!ChangeInProd
      EUREKA_URI:             http://eurekauser:eurekapass@eureka-server:8761/eureka
    networks:
      - smartorder-net
    healthcheck:
      test: ["CMD", "curl", "-f",
             "-u", "configuser:configpass",
             "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout:  10s
      retries:  5

  # ── Eureka Server ───────────────────────────────────────
  eureka-server:
    build:
      context: .
      dockerfile: services/eureka-server/Dockerfile
    container_name: smartorder-eureka
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URI:      http://config-server:8888
      CONFIG_SERVER_USER:     configuser
      CONFIG_SERVER_PASSWORD: configpass
      EUREKA_USER:            eurekauser
      EUREKA_PASSWORD:        eurekapass
    networks:
      - smartorder-net
    healthcheck:
      test: ["CMD", "curl", "-f",
             "-u", "eurekauser:eurekapass",
             "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout:  10s
      retries:  5

  # ── API Gateway ─────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: smartorder-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URI:      http://config-server:8888
      CONFIG_SERVER_USER:     configuser
      CONFIG_SERVER_PASSWORD: configpass
      EUREKA_URI:             http://eurekauser:eurekapass@eureka-server:8761/eureka
      REDIS_HOST:             redis
      REDIS_PASSWORD:         smartorder
      ALLOWED_ORIGINS:        http://localhost:3000
      JWT_SECRET:             MyUltraSecureJwtSecretKeyForDevOnly!ChangeInProd
    networks:
      - smartorder-net

  # ── Auth Service ────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: smartorder-auth
    ports:
      - "8081:8081"
    depends_on:
      postgres-auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URI:      http://config-server:8888
      CONFIG_SERVER_USER:     configuser
      CONFIG_SERVER_PASSWORD: configpass
      EUREKA_URI:             http://eurekauser:eurekapass@eureka-server:8761/eureka
      AUTH_DB_URL:            jdbc:postgresql://postgres-auth:5432/smartorder_auth
      AUTH_DB_USER:           smartorder
      AUTH_DB_PASS:           smartorder
      REDIS_HOST:             redis
      REDIS_PASSWORD:         smartorder
      KAFKA_BROKERS:          kafka:29092
      JWT_SECRET:             MyUltraSecureJwtSecretKeyForDevOnly!ChangeInProd
      ZIPKIN_ENDPOINT:        http://zipkin:9411/api/v2/spans
    networks:
      - smartorder-net

  # ── Product Service ─────────────────────────────────────
  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: smartorder-product
    ports:
      - "8082:8082"
    depends_on:
      postgres-product:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URI:      http://config-server:8888
      CONFIG_SERVER_USER:     configuser
      CONFIG_SERVER_PASSWORD: configpass
      EUREKA_URI:             http://eurekauser:eurekapass@eureka-server:8761/eureka
      PRODUCT_DB_URL:         jdbc:postgresql://postgres-product:5432/smartorder_products
      PRODUCT_DB_USER:        smartorder
      PRODUCT_DB_PASS:        smartorder
      REDIS_HOST:             redis
      REDIS_PASSWORD:         smartorder
      ELASTICSEARCH_URI:      http://elasticsearch:9200
      MINIO_ENDPOINT:         http://minio:9000
      MINIO_ACCESS_KEY:       minioadmin
      MINIO_SECRET_KEY:       minioadmin
      KAFKA_BROKERS:          kafka:29092
      ZIPKIN_ENDPOINT:        http://zipkin:9411/api/v2/spans
    networks:
      - smartorder-net

  # ── Cart Service ────────────────────────────────────────
  cart-service:
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
    container_name: smartorder-cart
    ports:
      - "8085:8085"
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URI:      http://config-server:8888
      CONFIG_SERVER_USER:     configuser
      CONFIG_SERVER_PASSWORD: configpass
      EUREKA_URI:             http://eurekauser:eurekapass@eureka-server:8761/eureka
      REDIS_HOST:             redis
      REDIS_PASSWORD:         smartorder
      KAFKA_BROKERS:          kafka:29092
      ZIPKIN_ENDPOINT:        http://zipkin:9411/api/v2/spans
    networks:
      - smartorder-net

  # ── Notification Service ────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: smartorder-notification
    ports:
      - "8086:8086"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URI:      http://config-server:8888
      CONFIG_SERVER_USER:     configuser
      CONFIG_SERVER_PASSWORD: configpass
      EUREKA_URI:             http://eurekauser:eurekapass@eureka-server:8761/eureka
      MONGO_URI:              mongodb://mongodb:27017/smartorder_notifications
      KAFKA_BROKERS:          kafka:29092
      ZIPKIN_ENDPOINT:        http://zipkin:9411/api/v2/spans
      MAIL_HOST:              smtp.mailtrap.io
      MAIL_PORT:              587
      MAIL_USER:              ${MAIL_USER:-}
      MAIL_PASS:              ${MAIL_PASS:-}
    networks:
      - smartorder-net

  # ── Frontend ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartorder-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:8080
      NEXT_PUBLIC_APP_URL:     http://localhost:3000
    networks:
      - smartorder-net